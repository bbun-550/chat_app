<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
    <style>
      :root {
        --bg: #f7f6f2;
        --panel: #ffffff;
        --panel-muted: #f1eee8;
        --text: #141a1f;
        --muted: #607080;
        --line: #d7d9d3;
        --brand: #166f5d;
        --brand-soft: #e2f4ef;
        --danger: #d04855;
        --mono: "JetBrains Mono", monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Sora", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 10%, #dcefe7 0%, transparent 32%),
          radial-gradient(circle at 90% 80%, #f7e8d8 0%, transparent 34%),
          var(--bg);
      }

      .shell {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr) 320px;
        height: 100vh;
        backdrop-filter: blur(1px);
      }

      .panel {
        overflow: auto;
        border-right: 1px solid var(--line);
        background: color-mix(in oklab, var(--panel) 93%, white 7%);
      }

      .panel:last-child {
        border-right: none;
        border-left: 1px solid var(--line);
      }

      .panel-head {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px;
        border-bottom: 1px solid var(--line);
        background: color-mix(in oklab, var(--panel) 95%, white 5%);
      }

      .title {
        font-weight: 700;
        letter-spacing: 0.04em;
        font-size: 14px;
      }

      .mono {
        font-family: var(--mono);
      }

      button,
      select,
      input,
      textarea {
        font-family: inherit;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      button,
      select,
      input {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 11px;
        padding: 9px 10px;
        color: var(--text);
      }

      button {
        cursor: pointer;
        transition: 140ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: 2px solid color-mix(in oklab, var(--brand) 62%, white 38%);
        outline-offset: 2px;
      }

      .primary {
        background: var(--brand);
        border-color: var(--brand);
        color: #fff;
        font-weight: 600;
      }

      .ghost {
        background: transparent;
      }

      .left-body {
        padding: 12px;
      }

      .conversation-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .conversation-item {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 10px;
        background: var(--panel-muted);
        display: grid;
        gap: 10px;
        animation: rise 220ms ease both;
      }

      .conversation-item.active {
        border-color: var(--brand);
        box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--brand) 35%, white 65%);
      }

      .conversation-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .conversation-title {
        margin: 0;
        padding: 0;
        border: none;
        background: transparent;
        font-weight: 600;
        line-height: 1.35;
        text-align: left;
        cursor: pointer;
      }

      .conversation-title-input {
        width: 100%;
        padding: 6px 8px;
        font-size: 14px;
      }

      .conversation-meta {
        font-size: 11px;
        color: var(--muted);
        font-family: var(--mono);
      }

      .icon-btn {
        width: 30px;
        height: 30px;
        border-radius: 10px;
        padding: 0;
        font-weight: 700;
      }

      .icon-btn.danger {
        color: var(--danger);
      }

      .chat {
        display: grid;
        grid-template-rows: auto 1fr auto;
        height: 100vh;
      }

      .topbar {
        border-bottom: 1px solid var(--line);
        background: color-mix(in oklab, var(--panel) 94%, white 6%);
      }

      .topbar-main {
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .active-label {
        font-size: 13px;
        color: var(--muted);
      }

      .mobile-actions {
        display: none;
      }

      .controls {
        padding: 10px 18px 16px;
        display: grid;
        grid-template-columns: 180px minmax(220px, 1fr) 220px;
        gap: 10px;
      }

      .control-wrap {
        display: grid;
        gap: 6px;
      }

      .control-wrap label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--muted);
      }

      .messages {
        padding: 22px;
        overflow: auto;
        display: grid;
        gap: 14px;
      }

      .msg {
        width: min(840px, 94%);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 14px 16px;
        background: #fff;
        animation: rise 220ms ease both;
      }

      .msg.user {
        margin-left: auto;
        background: linear-gradient(180deg, #eef9f6 0%, #e1f3ee 100%);
      }

      .msg-role {
        margin-bottom: 8px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: var(--muted);
      }

      .msg p,
      .msg ul,
      .msg ol,
      .msg pre {
        margin-top: 0;
        margin-bottom: 10px;
      }

      .msg pre {
        position: relative;
        border: 1px solid #e2e5de;
        border-radius: 10px;
        background: #f7f9f8;
        padding: 12px;
        overflow: auto;
      }

      .copy-btn {
        position: absolute;
        right: 8px;
        top: 8px;
        border-radius: 8px;
        font-size: 11px;
        padding: 3px 8px;
      }

      .loading {
        width: fit-content;
        border: 1px dashed #aac7bf;
        color: #356f61;
        background: var(--brand-soft);
      }

      .loading-dots {
        display: inline-flex;
        gap: 5px;
        margin-left: 6px;
      }

      .loading-dots span {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: currentColor;
        animation: pulse 1.1s ease infinite;
      }

      .loading-dots span:nth-child(2) {
        animation-delay: 0.12s;
      }

      .loading-dots span:nth-child(3) {
        animation-delay: 0.24s;
      }

      .composer {
        border-top: 1px solid var(--line);
        padding: 14px 18px;
        background: color-mix(in oklab, var(--panel) 94%, white 6%);
      }

      #messageInput {
        width: 100%;
        min-height: 88px;
        max-height: 240px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        line-height: 1.5;
      }

      .composer-row {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
        display: flex;
        gap: 10px;
        align-items: center;
      }

      #charCount {
        font-family: var(--mono);
      }

      .error {
        margin-top: 8px;
        min-height: 18px;
        color: var(--danger);
        font-size: 13px;
      }

      .stats {
        padding: 14px;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel-muted);
        padding: 10px;
      }

      .stat-label {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.04em;
      }

      .stat-value {
        margin-top: 6px;
        font-size: 15px;
        font-weight: 700;
        font-family: var(--mono);
      }

      .action-stack {
        margin-top: 12px;
        display: grid;
        gap: 8px;
      }

      .action-stack button {
        width: 100%;
      }

      .run-log {
        margin-top: 14px;
        display: grid;
        gap: 8px;
      }

      .run-item {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 9px;
        font-size: 12px;
        background: #fff;
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 14px;
        color: var(--muted);
        padding: 12px;
        font-size: 13px;
        text-align: center;
      }

      @keyframes rise {
        from {
          transform: translateY(10px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.25;
          transform: scale(0.8);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @media (max-width: 1150px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .panel {
          position: fixed;
          top: 0;
          bottom: 0;
          width: min(360px, 90vw);
          z-index: 25;
          transform: translateX(-104%);
          transition: transform 180ms ease;
          box-shadow: 0 18px 48px rgba(20, 24, 23, 0.2);
        }

        .panel.right {
          right: 0;
          left: auto;
          transform: translateX(104%);
        }

        body.left-open .panel.left {
          transform: translateX(0);
        }

        body.right-open .panel.right {
          transform: translateX(0);
        }

        .mobile-actions {
          display: flex;
          gap: 8px;
        }

        .controls {
          grid-template-columns: 1fr;
        }

        .messages {
          padding: 14px;
        }

        .msg {
          width: 100%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          transition-duration: 1ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="panel left">
        <div class="panel-head">
          <div class="title">Conversations</div>
          <button id="newConversationBtn" class="primary" type="button">+ New</button>
        </div>
        <div class="left-body">
          <div id="conversationList" class="conversation-list"></div>
        </div>
      </aside>

      <main class="chat">
        <div class="topbar">
          <div class="topbar-main">
            <div class="title">OpenClaw Console</div>
            <div class="active-label mono" id="activeConversationLabel" role="status" aria-live="polite">No conversation</div>
            <div class="mobile-actions">
              <button id="openConversationsBtn" class="ghost" type="button">Chats</button>
              <button id="openStatsBtn" class="ghost" type="button">Stats</button>
            </div>
          </div>
          <div class="controls">
            <div class="control-wrap">
              <label for="providerSelect">PROVIDER</label>
              <select id="providerSelect" name="provider" autocomplete="off" aria-label="Provider">
                <option value="gemini">gemini</option>
              </select>
            </div>
            <div class="control-wrap">
              <label for="modelInput">MODEL</label>
              <input id="modelInput" name="model" autocomplete="off" aria-label="Model" value="gemini-2.0-flash" />
            </div>
            <div class="control-wrap">
              <label for="systemPromptSelect">SYSTEM PROMPT</label>
              <select id="systemPromptSelect" name="system_prompt" autocomplete="off" aria-label="System prompt">
                <option value="">No system prompt</option>
              </select>
            </div>
          </div>
        </div>

        <section id="messages" class="messages" role="log" aria-live="polite"></section>

        <div class="composer">
          <textarea id="messageInput" name="message" aria-label="Message input" autocomplete="off" placeholder="메시지를 입력하세요… (Enter 전송 / Shift+Enter 줄바꿈)"></textarea>
          <div class="composer-row">
            <div class="hint">
              <span>Markdown + Code Highlight 지원</span>
              <span id="charCount">0 chars</span>
            </div>
            <button id="sendBtn" class="primary" type="button">Send</button>
          </div>
          <div id="errorBox" class="error" role="status" aria-live="polite"></div>
        </div>
      </main>

      <aside class="panel right">
        <div class="panel-head">
          <div class="title">Run Insights</div>
        </div>
        <div class="stats" id="statsBody"></div>
      </aside>
    </div>
    <script src="/app.js" defer></script>
  </body>
</html>
